name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 0.2.0)"
        required: true
        type: string
      publish_to_pypi:
        description: "Publish to PyPI (requires trusted publishing setup)"
        required: false
        default: false
        type: boolean

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Create release tag if missing
        run: |
          git fetch --tags
          if git rev-parse "v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Tag v${RELEASE_VERSION} already exists."
          else
            git tag "v${RELEASE_VERSION}"
            git push origin "v${RELEASE_VERSION}"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: v${{ env.RELEASE_VERSION }}
          files: |
            dist/*
          generate_release_notes: true

  publish-to-pypi:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: github.event.inputs.publish_to_pypi == 'true' && vars.PYPI_PUBLISH_ENABLED == 'true'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
